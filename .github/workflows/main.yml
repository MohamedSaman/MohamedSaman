# GitHub Action for generating a contribution graph
name: Generate Snake

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: Platane/snk@v3  # <-- THIS IS THE CORRECTED LINE
        id: snake-gif
        with:
          github_user_name: MohamedSaman
          # Generate a snake SVG
          svg_out_path: dist/github-contribution-grid-snake.svg

      - name: Ensure build dir exists
        run: |
          mkdir -p dist
          ls -la dist

      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          # The source directory for the pages deployment
          target_branch: output
          build_dir: dist
          allow_empty_commit: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
